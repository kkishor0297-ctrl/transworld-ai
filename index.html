<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="theme-color"
content="#041428">

<title>
Transworld AI
</title>

<link rel="icon"
href="logo.png">

<link rel="manifest"
href="manifest.json">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="background-grid"></div>

<div class="container">

<header>

<img
src="logo.png"
class="logo"
alt="Transworld AI">

<h1>

Transworld AI

</h1>

<p>

Universal Voice Translator

</p>

</header><!-- =========================
         LANGUAGE SELECTION
    ========================== -->

    <section class="language-section">

      <div class="language-card">

        <label class="label">
          🎙 Speak Language
        </label>

        <select id="sourceLang" class="language-select">
        </select>

      </div>

      <div class="swap-button-area">

        <button id="swapBtn" class="swap-btn">
          ⇄
        </button>

      </div>

      <div class="language-card">

        <label class="label">
          🌍 Translate To
        </label>

        <select id="targetLang" class="language-select">
        </select>

      </div>

    </section>


    <!-- =========================
         INPUT BOX
    ========================== -->

    <section class="translator-card">

      <div class="card-header">

        <h3>
          🎤 Speak or Type
        </h3>

        <span id="inputLangLabel">
          Hindi
        </span>

      </div>

      <textarea

        id="inputText"

        placeholder="Tap the microphone and start speaking..."

        rows="6">

      </textarea>

      <div class="card-footer">

        <button

          id="clearBtn"

          class="small-btn">

          🗑 Clear

        </button>

        <button

          id="speakInputBtn"

          class="small-btn">

          🔊 Listen

        </button>

      </div>

    </section>


    <!-- =========================
         MICROPHONE
    ========================== -->

    <div class="mic-section">

      <button

        id="micBtn"

        class="mic-btn">

        🎤

      </button>

      <p id="micStatus">

        Tap to Speak

      </p>

    </div>


    <!-- =========================
         TRANSLATE BUTTON
    ========================== -->

    <button

      id="translateBtn"

      class="translate-btn">

      🌐 Translate

    </button><!-- =========================
         TRANSLATION OUTPUT
    ========================== -->

    <section class="translator-card output-card">

      <div class="card-header">

        <h3>
          🌍 Translation
        </h3>

        <span id="outputLangLabel">
          English
        </span>

      </div>

      <textarea
        id="outputText"
        rows="6"
        placeholder="Translation will appear here..."
        readonly>
      </textarea>

      <div class="card-footer">

        <button
          id="copyBtn"
          class="small-btn">

          📋 Copy

        </button>

        <button
          id="speakOutputBtn"
          class="small-btn">

          🔊 Listen

        </button>

      </div>

    </section>


    <!-- =========================
         STATUS MESSAGE
    ========================== -->

    <div
      id="statusMsg"
      class="status-msg">

      Ready...

    </div>


  </main>


  <!-- =========================
       FOOTER
  ========================== -->

  <footer class="footer">

      <img
        src="logo.png"
        class="footer-logo"
        alt="Logo">

      <h3>
        Transworld AI
      </h3>

      <p>

        World's Smart AI Translator

      </p>

      <small>

        © 2026 Transworld AI

      </small>

  </footer>


</div>


<!-- JavaScript Files -->

<script src="languages.js"></script>

<script src="app.js"></script>

</body>
</html>
